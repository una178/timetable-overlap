<!DOCTYPE html>
<html>
<head>
  <title>시간표 비교</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>시간표 비교</h1>

<div class="controls">
  <input type="text" id="nameInput" placeholder="이름 입력">
  <button onclick="addPerson()">추가</button>
</div>

<div id="buttons"></div>

<div class="timetable" id="timetable">
  <div class="header">시간</div>
  <div class="header">월</div>
  <div class="header">화</div>
  <div class="header">수</div>
  <div class="header">목</div>
  <div class="header">금</div>

  <!-- 1~9교시 -->
  <!-- 반복 -->
  <script>
    for(let i=1;i<=9;i++){
      document.write(`<div>${i}</div>`);
      for(let j=0;j<5;j++){
        document.write(`<div class="cell" data-index="${(i-1)*5+j}"></div>`);
      }
    }
  </script>
</div>

<script src="script.js"></script>

</body>
</html>
